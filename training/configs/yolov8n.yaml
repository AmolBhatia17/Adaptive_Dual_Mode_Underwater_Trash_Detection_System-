# ──────────────────────────────────────────────────────────────
# YOLOv8n training config — DeepClean project
# Lightweight model: 3.2 M parameters, ~18 ms/frame inference
# ──────────────────────────────────────────────────────────────

# Dataset
data: datasets/merged/data.yaml

# Model
model: yolov8n.pt          # pretrained COCO checkpoint (auto-downloaded)

# Training
epochs:         180
patience:       30          # early stopping
batch:          32
imgsz:          640
workers:        8
device:         0           # GPU 0  (use 'cpu' if no CUDA)

# Optimiser
optimizer:      AdamW
lr0:            0.001
lrf:            0.01        # final lr = lr0 * lrf
momentum:       0.937
weight_decay:   0.0005
warmup_epochs:  3
warmup_momentum: 0.8

# Augmentation
hsv_h:          0.015
hsv_s:          0.7
hsv_v:          0.4
degrees:        5.0
translate:      0.1
scale:          0.5
shear:          2.0
perspective:    0.0005
flipud:         0.1
fliplr:         0.5
mosaic:         1.0
mixup:          0.1
copy_paste:     0.1

# Output
project:        training/results
name:           yolov8n
save_period:    20          # checkpoint every 20 epochs
exist_ok:       true

# Metrics
val:            true
plots:          true
save:           true
