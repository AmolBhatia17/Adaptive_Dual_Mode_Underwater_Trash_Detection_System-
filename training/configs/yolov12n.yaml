# ──────────────────────────────────────────────────────────────
# yolov12n training config — DeepClean project
# ──────────────────────────────────────────────────────────────

data: datasets/merged/data.yaml
model: yolov8n.pt

epochs:         180
patience:       30
batch:          32
imgsz:          640
workers:        8
device:         0

optimizer:      AdamW
lr0:            0.001
lrf:            0.01
momentum:       0.937
weight_decay:   0.0005
warmup_epochs:  3
warmup_momentum: 0.8

hsv_h:          0.015
hsv_s:          0.7
hsv_v:          0.4
degrees:        5.0
translate:      0.1
scale:          0.5
shear:          2.0
perspective:    0.0005
flipud:         0.1
fliplr:         0.5
mosaic:         1.0
mixup:          0.1
copy_paste:     0.1

project:        training/results
name:           yolov12n
save_period:    20
exist_ok:       true

val:            true
plots:          true
save:           true
