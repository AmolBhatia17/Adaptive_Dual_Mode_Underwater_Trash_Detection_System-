<svg viewBox="0 0 820 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.16"/></filter>
  </defs>

  <rect width="820" height="540" fill="#F8F9FA" rx="12"/>

  <!-- Title -->
  <rect x="0" y="0" width="820" height="48" fill="#1A237E" rx="12"/>
  <rect x="0" y="36" width="820" height="12" fill="#1A237E"/>
  <text x="410" y="31" text-anchor="middle" fill="white" font-size="16" font-weight="bold">
    Complexity Score — Parameter Weight Distribution
  </text>

  <!-- ── SCENE ATTRIBUTES GROUP ── -->
  <rect x="20" y="65" width="245" height="440" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="20" y="65" width="245" height="36" rx="10" fill="#1565C0"/>
  <rect x="20" y="89" width="245" height="12" fill="#1565C0"/>
  <text x="142" y="88" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Scene Attributes</text>
  <text x="142" y="102" text-anchor="middle" fill="#BBDEFB" font-size="10">Category weight: 40%</text>

  <!-- P1–P8 bars -->
  <!-- helper: bar at x=30, bar width proportional to weight, max w=200 for w=0.10 -->
  <!-- P1: w=0.08 → 160px -->
  <text x="35" y="128" fill="#1565C0" font-size="9" font-weight="bold">P1 Turbidity</text>
  <rect x="35" y="132" width="160" height="14" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="200" y="143" fill="#1565C0" font-size="9">8%</text>

  <!-- P2: w=0.06 → 120px -->
  <text x="35" y="158" fill="#1565C0" font-size="9" font-weight="bold">P2 Lighting Variation</text>
  <rect x="35" y="162" width="120" height="14" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="160" y="173" fill="#1565C0" font-size="9">6%</text>

  <!-- P3: w=0.07 → 140px -->
  <text x="35" y="188" fill="#1565C0" font-size="9" font-weight="bold">P3 Texture Richness</text>
  <rect x="35" y="192" width="140" height="14" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="180" y="203" fill="#1565C0" font-size="9">7%</text>

  <!-- P4: w=0.07 → 140px -->
  <text x="35" y="218" fill="#1565C0" font-size="9" font-weight="bold">P4 Occlusion Level</text>
  <rect x="35" y="222" width="140" height="14" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="180" y="233" fill="#1565C0" font-size="9">7%</text>

  <!-- P5: w=0.05 → 100px -->
  <text x="35" y="248" fill="#1565C0" font-size="9" font-weight="bold">P5 Motion Blur</text>
  <rect x="35" y="252" width="100" height="14" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="140" y="263" fill="#1565C0" font-size="9">5%</text>

  <!-- P6: w=0.04 → 80px -->
  <text x="35" y="278" fill="#1565C0" font-size="9" font-weight="bold">P6 Camera Stability</text>
  <rect x="35" y="282" width="80" height="14" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="120" y="293" fill="#1565C0" font-size="9">4%</text>

  <!-- P7: w=0.06 → 120px -->
  <text x="35" y="308" fill="#1565C0" font-size="9" font-weight="bold">P7 Colour Cast</text>
  <rect x="35" y="312" width="120" height="14" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="160" y="323" fill="#1565C0" font-size="9">6%</text>

  <!-- P8: w=0.03 → 60px  (changed to 0.05) -->
  <text x="35" y="338" fill="#1565C0" font-size="9" font-weight="bold">P8 Object Density</text>
  <rect x="35" y="342" width="100" height="14" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="140" y="353" fill="#1565C0" font-size="9">5%</text>

  <!-- Total -->
  <line x1="35" y1="368" x2="248" y2="368" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="35" y="382" fill="#0D47A1" font-size="10" font-weight="bold">Σ = 40%</text>

  <!-- ── MODEL FEEDBACK GROUP ── -->
  <rect x="287" y="65" width="245" height="440" rx="10" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="287" y="65" width="245" height="36" rx="10" fill="#F57F17"/>
  <rect x="287" y="89" width="245" height="12" fill="#F57F17"/>
  <text x="409" y="88" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Model Feedback</text>
  <text x="409" y="102" text-anchor="middle" fill="#FFF9C4" font-size="10">Category weight: 35%</text>

  <!-- P9: w=0.08 → 160px -->
  <text x="302" y="128" fill="#E65100" font-size="9" font-weight="bold">P9  Low Confidence</text>
  <rect x="302" y="132" width="160" height="14" rx="3" fill="#E65100" opacity="0.7"/>
  <text x="467" y="143" fill="#E65100" font-size="9">8%</text>

  <!-- P10: w=0.05 → 100px -->
  <text x="302" y="158" fill="#E65100" font-size="9" font-weight="bold">P10 Confidence Variance</text>
  <rect x="302" y="162" width="100" height="14" rx="3" fill="#E65100" opacity="0.7"/>
  <text x="407" y="173" fill="#E65100" font-size="9">5%</text>

  <!-- P11: w=0.04 → 80px -->
  <text x="302" y="188" fill="#E65100" font-size="9" font-weight="bold">P11 Inference Latency</text>
  <rect x="302" y="192" width="80" height="14" rx="3" fill="#E65100" opacity="0.7"/>
  <text x="387" y="203" fill="#E65100" font-size="9">4%</text>

  <!-- P12: w=0.06 → 120px -->
  <text x="302" y="218" fill="#E65100" font-size="9" font-weight="bold">P12 Detection Dropout</text>
  <rect x="302" y="222" width="120" height="14" rx="3" fill="#E65100" opacity="0.7"/>
  <text x="427" y="233" fill="#E65100" font-size="9">6%</text>

  <!-- P13: w=0.04 → 80px -->
  <text x="302" y="248" fill="#E65100" font-size="9" font-weight="bold">P13 False Positive Ratio</text>
  <rect x="302" y="252" width="80" height="14" rx="3" fill="#E65100" opacity="0.7"/>
  <text x="387" y="263" fill="#E65100" font-size="9">4%</text>

  <!-- P14: w=0.05 → 100px -->
  <text x="302" y="278" fill="#E65100" font-size="9" font-weight="bold">P14 BBox Instability</text>
  <rect x="302" y="282" width="100" height="14" rx="3" fill="#E65100" opacity="0.7"/>
  <text x="407" y="293" fill="#E65100" font-size="9">5%</text>

  <!-- Padding rows for alignment -->
  <line x1="302" y1="368" x2="515" y2="368" stroke="#F57F17" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="302" y="382" fill="#E65100" font-size="10" font-weight="bold">Σ = 35% (P9–P14)</text>

  <!-- ── MISSION CONTEXT GROUP ── -->
  <rect x="554" y="65" width="245" height="440" rx="10" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="554" y="65" width="245" height="36" rx="10" fill="#7B1FA2"/>
  <rect x="554" y="89" width="245" height="12" fill="#7B1FA2"/>
  <text x="676" y="88" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Mission Context</text>
  <text x="676" y="102" text-anchor="middle" fill="#E1BEE7" font-size="10">Category weight: 25%</text>

  <!-- P15: w=0.06 → 120px -->
  <text x="569" y="128" fill="#6A1B9A" font-size="9" font-weight="bold">P15 Battery Level (inv.)</text>
  <rect x="569" y="132" width="120" height="14" rx="3" fill="#7B1FA2" opacity="0.7"/>
  <text x="694" y="143" fill="#6A1B9A" font-size="9">6%</text>

  <!-- P16: w=0.05 → 100px -->
  <text x="569" y="158" fill="#6A1B9A" font-size="9" font-weight="bold">P16 Mission Phase</text>
  <rect x="569" y="162" width="100" height="14" rx="3" fill="#7B1FA2" opacity="0.7"/>
  <text x="674" y="173" fill="#6A1B9A" font-size="9">5%</text>

  <!-- P17: w=0.03 → 60px -->
  <text x="569" y="188" fill="#6A1B9A" font-size="9" font-weight="bold">P17 Trash Priority</text>
  <rect x="569" y="192" width="60" height="14" rx="3" fill="#7B1FA2" opacity="0.7"/>
  <text x="634" y="203" fill="#6A1B9A" font-size="9">3%</text>

  <!-- P18: w=0.02 → 40px -->
  <text x="569" y="218" fill="#6A1B9A" font-size="9" font-weight="bold">P18 Distance to Zone</text>
  <rect x="569" y="222" width="40" height="14" rx="3" fill="#7B1FA2" opacity="0.7"/>
  <text x="614" y="233" fill="#6A1B9A" font-size="9">2%</text>

  <!-- P19: w=0.02 → 40px -->
  <text x="569" y="248" fill="#6A1B9A" font-size="9" font-weight="bold">P19 Time Remaining (inv.)</text>
  <rect x="569" y="252" width="40" height="14" rx="3" fill="#7B1FA2" opacity="0.7"/>
  <text x="614" y="263" fill="#6A1B9A" font-size="9">2%</text>

  <!-- P20: w=0.02 → 40px -->
  <text x="569" y="278" fill="#6A1B9A" font-size="9" font-weight="bold">P20 Bandwidth (inv.)</text>
  <rect x="569" y="282" width="40" height="14" rx="3" fill="#7B1FA2" opacity="0.7"/>
  <text x="614" y="293" fill="#6A1B9A" font-size="9">2%</text>

  <line x1="569" y1="368" x2="782" y2="368" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="569" y="382" fill="#6A1B9A" font-size="10" font-weight="bold">Σ = 25% (P15–P20)</text>

  <!-- ── TOTAL BAR ── -->
  <rect x="20" y="515" width="780" height="16" rx="4" fill="#37474F" filter="url(#sh)"/>
  <rect x="20" y="515" width="312" height="16" rx="0" fill="#1565C0"/>
  <rect x="332" y="515" width="273" height="16" fill="#E65100"/>
  <rect x="605" y="515" width="195" height="16" rx="0" fill="#7B1FA2"/>
  <text x="176" y="527" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Scene 40%</text>
  <text x="468" y="527" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Model Feedback 35%</text>
  <text x="702" y="527" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Mission 25%</text>

  <!-- Formula -->
  <text x="410" y="410" text-anchor="middle" fill="#37474F" font-size="11" font-weight="bold">
    CS_raw(t) = Σ wᵢ · pᵢ(t)  where  Σwᵢ = 1.0
  </text>
  <text x="410" y="428" text-anchor="middle" fill="#546E7A" font-size="9">
    Weights adapt dynamically via 13 context-sensitive amplification rules
  </text>
  <text x="410" y="444" text-anchor="middle" fill="#546E7A" font-size="9">
    Re-normalised to Σ = 1.0 after each rule application
  </text>
  <text x="410" y="462" text-anchor="middle" fill="#37474F" font-size="11" font-weight="bold">
    CS̃(t) = 0.30 · CS_raw(t) + 0.70 · CS̃(t−1)     [EMA, α = 0.30]
  </text>
  <text x="410" y="480" text-anchor="middle" fill="#546E7A" font-size="9">
    All parameters pᵢ ∈ [0, 1].  Higher = greater scene complexity / difficulty.
  </text>
</svg>
